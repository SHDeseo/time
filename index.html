// ---------- Derived ----------
function buildCombos(priority, shows, avail) {
  // group by role
  const byRole = {L:[], R:[], M:[], T:[]};
  priority.forEach((p, idx) => {
    byRole[p.roleId].push({ ...p, rank: byRole[p.roleId].length + 1, globalIdx: idx });
  });
  // role-internal points: actor's role rank → role.length - rank + 1
  const points = {};
  Object.entries(byRole).forEach(([rid, list]) => {
    list.forEach(p => { points[p.actor] = list.length - p.rank + 1; });
  });

  const combos = [];
  for (const l of byRole.L) for (const r of byRole.R) for (const m of byRole.M) for (const t of byRole.T) {
    const cast = [l, r, m, t];
    const score = cast.reduce((s, c) => s + points[c.actor], 0);
    // available shows = intersection
    const slotIds = shows
      .filter(s => cast.every(c => (avail[c.actor] || []).includes(s.id)))
      .map(s => s.id);
    combos.push({
      id: cast.map(c => c.actor).join('|'),
      cast: cast.map(c => ({ actor: c.actor, roleId: c.roleId, rank: c.rank })),
      score,
      slots: slotIds,
    });
  }
  combos.sort((a,b) => b.score - a.score || a.slots.length - b.slots.length);
  combos.forEach((c, i) => c.rank = i + 1);
  return { combos, points };
}


function parseKoreanDateLabel(label, now = new Date()) {
  const m = label.match(/(\d+)월\s*(\d+)일/);
  if (!m) return null;
  const [, month, day] = m.map(Number);
  return new Date(now.getFullYear(), month - 1, day, 0, 0, 0, 0);
}
function parseShowDateTime(show, now = new Date()) {
  const d = parseKoreanDateLabel(show.rawDate || show.d, now);
  if (!d) return null;
  const [hh = 0, mm = 0] = (show.t || '00:00').split(':').map(Number);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), hh, mm, 0, 0);
}
function toShortDate(label) {
  const d = parseKoreanDateLabel(label);
  if (!d) return label;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ---------- Priority list (drag to reorder, full list) ----------
function PriorityList({priority, setPriority, points}) {
  const [dragId, setDragId] = useState(null);
  const [overIdx, setOverIdx] = useState(null);

  const move = (from, to) => {
    if (from === to || from < 0 || to < 0) return;
    setPriority(prev => {
      const arr = [...prev];
      const [item] = arr.splice(from, 1);
      arr.splice(to, 0, item);
      return arr;
    });
  };

  const onDragStart = (e, idx) => {
    setDragId(idx);
    e.dataTransfer.effectAllowed = 'move';
  };
  const onDragOver = (e, idx) => {
    e.preventDefault();
    setOverIdx(idx);
  };
  const onDrop = (e, idx) => {
    e.preventDefault();
    if (dragId !== null) move(dragId, idx);
    setDragId(null); setOverIdx(null);
  };
  const onDragEnd = () => { setDragId(null); setOverIdx(null); };

  return (
    <div style={{display:'flex', flexDirection:'column', gap:3}}>
      {priority.map((p, i) => {
        const role = ROLE[p.roleId];
        const isDragging = dragId === i;
        const isOver = overIdx === i && dragId !== null && dragId !== i;
        return (
          <div
            key={`${p.roleId}-${p.actor}`}
            draggable
            onDragStart={(e) => onDragStart(e, i)}
            onDragOver={(e) => onDragOver(e, i)}
            onDrop={(e) => onDrop(e, i)}
            onDragEnd={onDragEnd}
            style={{
              display:'grid',
              gridTemplateColumns: '20px 22px 1fr auto',
              alignItems:'center', gap:8,
              padding:'7px 9px',
              background: isOver ? 'var(--accent-softer)' : 'var(--surface)',
              border: '1px solid ' + (isOver ? 'var(--accent)' : 'var(--line)'),
              borderRadius: 6,
              cursor: 'grab',
              opacity: isDragging ? 0.4 : 1,
              transition: 'background 80ms, border-color 80ms',
            }}
          >
            <span className="mono" style={{
              fontSize: 11, color:'var(--ink-3)', textAlign:'center', userSelect:'none'
            }}>{i+1}</span>
            <span style={{display:'flex', alignItems:'center'}}>
              <RoleDot roleId={p.roleId} size={9} />
            </span>
            <span style={{display:'flex', alignItems:'baseline', gap:8, minWidth:0}}>
              <span style={{
                fontSize: 10, color: role.color, fontWeight:600,
                letterSpacing: 0.2, flexShrink: 0
              }}>{role.name}</span>
              <span style={{fontSize: 13, fontWeight: 500, color:'var(--ink)'}}>{p.actor}</span>
            </span>
            <span className="mono" style={{
              fontSize: 11, color:'var(--ink-3)', userSelect:'none'
            }}>+{points[p.actor]}</span>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Combo row (compact) ----------
function ComboRow({combo, selected, onSelect, focusShowId}) {
  const focusable = focusShowId && combo.slots.includes(focusShowId);
  return (
    <button
      onClick={() => onSelect(combo.id)}
      style={{
        display:'grid',
        gridTemplateColumns: '32px minmax(0,1fr) 60px 70px',
        alignItems:'center', gap: 12,
        padding: '10px 12px',
        background: selected ? 'var(--accent-softer)' : 'transparent',
        border: '1px solid ' + (selected ? 'var(--accent)' : 'transparent'),
        borderRadius: 6,
        textAlign:'left',
        width:'100%',
        cursor:'pointer',
        transition: 'background 80ms, border-color 80ms',
      }}
      onMouseOver={(e) => { if (!selected) e.currentTarget.style.background = 'var(--surface-2)'; }}
      onMouseOut={(e) => { if (!selected) e.currentTarget.style.background = 'transparent'; }}
    >
      <span style={{
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        width: 24, height: 24, borderRadius: 99,
        background: combo.rank <= 3 ? 'var(--accent)' : 'var(--surface)',
        color: combo.rank <= 3 ? '#fff' : 'var(--ink-2)',
        border: combo.rank <= 3 ? 'none' : '1px solid var(--line)',
        fontSize: 11, fontWeight: 600,
      }} className="mono">{combo.rank}</span>
      <CastInline cast={combo.cast} fontSize={13} />
      <span className="mono tnum" style={{
        fontSize: 16, fontWeight: 600, color:'var(--ink)', textAlign:'right'
      }}>{combo.score}</span>
      <span className="mono tnum" style={{
        fontSize: 12, color: combo.slots.length === 0 ? 'var(--ink-4)' : 'var(--ink-2)',
        textAlign:'right'
      }}>
        {combo.slots.length}회
        {focusable && <span style={{color:'var(--warn)', marginLeft:4}}>●</span>}
      </span>
    </button>
  );
}

// ---------- Heatmap ----------
function Heatmap({combos, shows, selectedId, focusShowId, setFocusShowId, setSelectedId}) {
  const COL_W = 60;
  const ROW_H = 32;
  const LABEL_W = 280;
  const SCORE_W = 50;

  return (
    <div style={{overflowX:'auto'}}>
      <div style={{minWidth: LABEL_W + SCORE_W + COL_W * shows.length + 24}}>
        {/* Column headers */}
        <div style={{
          display:'grid',
          gridTemplateColumns: `${LABEL_W}px ${SCORE_W}px repeat(${shows.length}, ${COL_W}px)`,
          gap: 0, marginBottom: 6, alignItems:'end',
          paddingBottom: 8, borderBottom: '1px solid var(--line)',
        }}>
          <div style={{fontSize: 11, color: 'var(--ink-3)', fontWeight: 500, paddingLeft: 4}}>조합</div>
          <div style={{fontSize: 11, color: 'var(--ink-3)', fontWeight: 500, textAlign: 'right', paddingRight: 8}}>선호도</div>
          {shows.map(s => {
            const isFocus = focusShowId === s.id;
            return (
              <button
                key={s.id}
                onClick={() => setFocusShowId(isFocus ? null : s.id)}
                style={{
                  textAlign: 'center', padding: '4px 2px',
                  background: isFocus ? 'var(--warn-soft)' : 'transparent',
                  borderRadius: 4, cursor: 'pointer',
                  border: '1px solid ' + (isFocus ? 'var(--warn)' : 'transparent'),
                }}
              >
                <div className="mono" style={{fontSize: 11, fontWeight: 600, color: isFocus ? 'var(--warn)' : 'var(--ink)'}}>{s.d}</div>
                <div style={{fontSize: 10, color: isFocus ? 'var(--warn)' : 'var(--ink-3)'}}>{s.dow}</div>
                <div className="mono" style={{fontSize: 10, color: isFocus ? 'var(--warn)' : 'var(--ink-2)'}}>{s.t}</div>
              </button>
            );
          })}
        </div>

        {/* Rows */}
        {combos.map(c => {
          const isSel = selectedId === c.id;
          return (
            <div
              key={c.id}
              onClick={() => setSelectedId(c.id)}
              style={{
                display:'grid',
                gridTemplateColumns: `${LABEL_W}px ${SCORE_W}px repeat(${shows.length}, ${COL_W}px)`,
                alignItems:'center',
                height: ROW_H,
                background: isSel ? 'var(--accent-softer)' : 'transparent',
                borderRadius: 4,
                cursor:'pointer',
              }}
            >
              <div style={{display:'flex', alignItems:'center', gap:8, paddingLeft: 4, minWidth:0}}>
                <span style={{
                  display:'inline-flex', alignItems:'center', justifyContent:'center',
                  width: 18, height: 18, borderRadius: 99,
                  background: c.rank <= 3 ? 'var(--accent)' : 'var(--surface-2)',
                  color: c.rank <= 3 ? '#fff' : 'var(--ink-3)',
                  border: c.rank <= 3 ? 'none' : '1px solid var(--line)',
                  fontSize: 10, fontWeight: 600, flexShrink:0,
                }} className="mono">{c.rank}</span>
                <span style={{display:'flex', alignItems:'center', gap:4, fontSize: 12, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                  {c.cast.map((m, i) => (
                    <React.Fragment key={i}>
                      <RoleDot roleId={m.roleId} size={6} />
                      <span style={{fontWeight: isSel ? 500 : 400}}>{m.actor}</span>
                      {i < c.cast.length-1 && <span style={{color:'var(--ink-4)', margin:'0 2px'}}>·</span>}
                    </React.Fragment>
                  ))}
                </span>
              </div>
              <div className="mono tnum" style={{fontSize: 13, fontWeight: 600, textAlign: 'right', paddingRight: 8}}>{c.score}</div>
              {shows.map(s => {
                const has = c.slots.includes(s.id);
                const isCellFocus = focusShowId === s.id;
                let bg = 'transparent';
                if (has && isSel) bg = 'var(--accent)';
                else if (has) bg = 'var(--accent-soft)';

                return (
                  <div key={s.id} style={{
                    padding: 3,
                    background: isCellFocus && !has ? 'rgba(201,95,68,0.05)' : 'transparent',
                  }}>
                    <div style={{
                      width: '100%', height: ROW_H - 8,
                      background: bg,
                      border: isCellFocus && has ? '1.5px solid var(--warn)' : has ? '1px solid transparent' : '1px dashed var(--line)',
                      borderRadius: 3,
                    }}/>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------- Selection detail bar ----------
function DetailBar({combo, shows, focusShowId}) {
  if (!combo) return null;
  const slots = combo.slots.map(id => shows.find(s => s.id === id));
  return (
    <div className="surface" style={{
      padding: '14px 18px',
      display:'grid', gridTemplateColumns: '1fr auto auto', gap: 24, alignItems:'center'
    }}>
      <div style={{minWidth:0}}>
        <div style={{fontSize: 10, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing: 0.5, marginBottom: 2}}>선택 조합</div>
        <CastInline cast={combo.cast} fontSize={16} weight={500} />
      </div>
      <div style={{display:'flex', gap: 18, alignItems:'baseline'}}>
        <div>
          <div style={{fontSize: 10, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing: 0.5, marginBottom: 2}}>가능 회차</div>
          <div style={{display:'flex', flexWrap:'wrap', gap: 4, maxWidth: 360}}>
            {slots.map(s => (
              <span key={s.id} className="mono tnum" style={{
                fontSize: 11, padding: '2px 6px', borderRadius: 3,
                background: focusShowId === s.id ? 'var(--warn-soft)' : 'var(--surface-2)',
                color: focusShowId === s.id ? 'var(--warn)' : 'var(--ink-2)',
                border: '1px solid ' + (focusShowId === s.id ? 'var(--warn)' : 'var(--line)'),
                fontWeight: 500,
              }}>
                {s.d} {s.dow} {s.t}
              </span>
            ))}
            {slots.length === 0 && <span style={{fontSize: 12, color:'var(--ink-3)'}}>가능한 회차 없음</span>}
          </div>
        </div>
      </div>
      <div style={{textAlign:'right'}}>
        <div style={{fontSize: 10, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing: 0.5, marginBottom: 2}}>선호도</div>
        <div className="mono tnum" style={{fontSize: 28, fontWeight: 600, color:'var(--accent)', lineHeight: 1}}>{combo.score}</div>
      </div>
    </div>
  );
}

// ---------- Filters ----------
function FilterBar({filters, setFilters}) {
  const items = [
    { key: 'weekendOnly', label: '주말만' },
    { key: 'matineeOnly', label: '낮공만' },
    { key: 'hideSeen', label: '본 조합 제외' },
    { key: 'excludeSon', label: '손승연 제외' },
  ];
  return (
    <div style={{display:'flex', gap: 6, flexWrap:'wrap'}}>
      {items.map(it => {
        const on = filters[it.key];
        return (
          <button
            key={it.key}
            onClick={() => setFilters(f => ({...f, [it.key]: !f[it.key]}))}
            style={{
              padding: '5px 10px',
              fontSize: 12,
              borderRadius: 99,
              border: '1px solid ' + (on ? 'var(--accent)' : 'var(--line)'),
              background: on ? 'var(--accent)' : 'var(--surface)',
              color: on ? '#fff' : 'var(--ink-2)',
              fontWeight: 500,
              transition: 'all 80ms',
            }}
          >{it.label}</button>
        );
      })}
    </div>
  );
}

// ---------- Header ----------
function Header({comboCount, showCount, sort, setSort}) {
  return (
    <div style={{
      display:'flex', justifyContent:'space-between', alignItems:'flex-end',
      padding: '20px 24px 16px', borderBottom: '1px solid var(--line)',
    }}>
      <div>
        <div style={{display:'flex', alignItems:'center', gap: 10, marginBottom: 4}}>
          <div style={{width: 22, height: 22, borderRadius: 6, background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize: 13, fontWeight: 600}}>♪</div>
          <div style={{fontSize: 18, fontWeight: 600, letterSpacing: -0.2}}>배우 스케줄링</div>
        </div>
        <div style={{fontSize: 12, color:'var(--ink-3)'}}>
          우선순위로 조합 선호도를 매기고, 시간 순으로 회차를 탐색
        </div>
      </div>
      <div style={{display:'flex', gap: 16, alignItems:'center', fontSize: 12}}>
        <Stat label="조합" value={comboCount} />
        <Sep />
        <Stat label="회차" value={showCount} />
        <Sep />
        <div style={{display:'flex', flexDirection:'column', gap:2}}>
          <span style={{fontSize: 10, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing: 0.5}}>정렬</span>
          <div style={{display:'flex', gap: 2, padding: 2, background:'var(--surface-2)', border: '1px solid var(--line)', borderRadius: 6}}>
            {[
              {k:'score',    l:'선호도↓',   tip:'선호도 높은 순'},
              {k:'slotsDesc',l:'회차↓',   tip:'가능 회차 많은 순'},
              {k:'rare',     l:'희소성',  tip:'가능 회차 적은 순 (놓치기 쉬움)'},
              {k:'earliest', l:'가까운순', tip:'가장 빠른 회차 기준'},
            ].map(o => (
              <button
                key={o.k}
                onClick={() => setSort(o.k)}
                title={o.tip}
                style={{
                  padding: '3px 8px', fontSize: 11, fontWeight: 500,
                  borderRadius: 4,
                  background: sort === o.k ? 'var(--surface)' : 'transparent',
                  border: '1px solid ' + (sort === o.k ? 'var(--line)' : 'transparent'),
                  color: sort === o.k ? 'var(--ink)' : 'var(--ink-3)',
                  boxShadow: sort === o.k ? 'var(--shadow-sm)' : 'none',
                }}
              >{o.l}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
const Stat = ({label, value}) => (
  <div style={{display:'flex', flexDirection:'column', gap:2}}>
    <span style={{fontSize: 10, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing: 0.5}}>{label}</span>
    <span className="mono tnum" style={{fontSize: 16, fontWeight: 600}}>{value}</span>
  </div>
);
const Sep = () => <div style={{width:1, height:24, background:'var(--line)'}}/>;

// ---------- Legend ----------
function Legend() {
  const items = [
    { sw: <div style={{width:12, height:12, border:'1px dashed var(--line-2)', borderRadius:2}}/>, l: '없음' },
    { sw: <div style={{width:12, height:12, background:'var(--accent-soft)', borderRadius:2}}/>, l: '출연 가능' },
    { sw: <div style={{width:12, height:12, background:'var(--accent)', borderRadius:2}}/>, l: '선택 조합' },
    { sw: <div style={{width:12, height:12, border:'1.5px solid var(--warn)', background:'#fff', borderRadius:2}}/>, l: '포커스 회차' },
  ];
  return (
    <div style={{display:'flex', gap: 14, alignItems:'center', flexWrap:'wrap'}}>
      {items.map((it, i) => (
        <div key={i} style={{display:'flex', alignItems:'center', gap: 6, fontSize: 11, color:'var(--ink-2)'}}>
          {it.sw}<span>{it.l}</span>
        </div>
      ))}
    </div>
  );
}

// ---------- Role legend ----------
function RoleLegend() {
  return (
    <div style={{display:'flex', gap: 12, flexWrap:'wrap'}}>
      {ROLE_LIST.map(r => (
        <span key={r.id} style={{display:'inline-flex', alignItems:'center', gap:5, fontSize: 11, color:'var(--ink-2)'}}>
          <RoleDot roleId={r.id} size={8} />{r.name}
        </span>
      ))}
    </div>
  );
}

// ---------- App ----------
function App() {
  const [priority, setPriority] = useState(INITIAL_PRIORITY);
  const [shows, setShows] = useState(FALLBACK_SHOWS);
  const [avail, setAvail] = useState(FALLBACK_AVAIL);
  const [filters, setFilters] = useState({weekendOnly:false, matineeOnly:false, hideSeen:false, excludeSon:false});
  const [sort, setSort] = useState('score');
  const [selectedId, setSelectedId] = useState(null);
  const [focusShowId, setFocusShowId] = useState('s5'); // 5/3 일 19:00

  useEffect(() => {
    const parseCsvText = (txt) => {
      const rows = txt.trim().split('\n').map(line => line.split(','));
      const header = rows[0] || [];
      const idx = {
        date: header.indexOf('날짜'),
        dow: header.indexOf('요일'),
        time: header.indexOf('시간'),
        L: header.indexOf('렘피카'),
        R: header.indexOf('라파엘라'),
        M: header.indexOf('마리네티'),
        T: header.indexOf('타데우스'),
      };
      const dataRows = rows.slice(1).filter(r => r.length >= 7);
      const nextShows = dataRows.map((r, i) => ({
        id: `c${i+1}`,
        rawDate: r[idx.date],
        d: toShortDate(r[idx.date]),
        dow: r[idx.dow],
        t: r[idx.time],
      }));
      const nextAvail = {};
      dataRows.forEach((r, i) => {
        const sid = `c${i+1}`;
        ['L','R','M','T'].forEach(key => {
          const actor = r[idx[key]];
          if (!actor) return;
          if (!nextAvail[actor]) nextAvail[actor] = [];
          nextAvail[actor].push(sid);
        });
      });
      setShows(nextShows);
      setAvail(nextAvail);
    };

    try {
      parseCsvText(EMBEDDED_CSV);
    } catch (e) {
      console.warn('Embedded CSV parse failed. Using fallback data.', e);
    }
  }, []);

  const { combos, points } = useMemo(() => buildCombos(priority, shows, avail), [priority, shows, avail]);

  // Apply filters
  const visibleCombos = useMemo(() => {
    let cs = combos;
    if (filters.excludeSon) cs = cs.filter(c => !c.cast.some(m => m.actor === '손승연'));
    if (sort === 'slotsDesc') {
      cs = [...cs].sort((a,b) => b.slots.length - a.slots.length || b.score - a.score);
    } else if (sort === 'rare') {
      // 희소성: 가능 회차가 적을수록 위 (단 0회는 맨 아래)
      cs = [...cs].sort((a,b) => {
        if (a.slots.length === 0 && b.slots.length !== 0) return 1;
        if (b.slots.length === 0 && a.slots.length !== 0) return -1;
        return a.slots.length - b.slots.length || b.score - a.score;
      });
    } else if (sort === 'earliest') {
      // 가까운순: 사용자가 보는 '오늘' 기준으로 가장 빠른 가능 회차 정렬
      const now = new Date();
      const nowTime = now.getTime();
      const showMap = Object.fromEntries(shows.map(s => [s.id, s]));
      const nearestFromToday = (combo) => {
        const futureDates = combo.slots
          .map(id => showMap[id])
          .filter(Boolean)
          .map(show => parseShowDateTime(show, now))
          .filter(date => date && date.getTime() >= nowTime)
          .sort((a,b) => a - b);
        return futureDates.length ? futureDates[0].getTime() : Number.POSITIVE_INFINITY;
      };

      cs = [...cs].sort((a,b) => {
        const at = nearestFromToday(a);
        const bt = nearestFromToday(b);
        return at - bt || b.score - a.score;
      });
    }
    return cs;
  }, [combos, filters, sort, shows]);

  // Auto-select top combo when none chosen / when combo set changes
  useEffect(() => {
    if (!selectedId || !visibleCombos.find(c => c.id === selectedId)) {
      if (visibleCombos[0]) setSelectedId(visibleCombos[0].id);
    }
  }, [visibleCombos, selectedId]);

  const selected = visibleCombos.find(c => c.id === selectedId);
  const preferredCombos = useMemo(() => (
    [...visibleCombos].sort((a,b) => b.score - a.score || a.slots.length - b.slots.length)
  ), [visibleCombos]);

  return (
    <div style={{
      maxWidth: 1400, margin: '0 auto', padding: 20,
      display:'flex', flexDirection:'column', gap: 16,
    }}>
      <div className="surface" style={{padding: 0, overflow:'hidden'}}>
        <Header comboCount={visibleCombos.length} showCount={shows.length} sort={sort} setSort={setSort} />

        <div style={{display:'grid', gridTemplateColumns: '300px 1fr', gap: 0}}>
          {/* Left: priority */}
          <div style={{padding: '18px 18px', borderRight: '1px solid var(--line)', background:'var(--surface-2)'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 12}}>
              <h3 style={{fontSize: 13, fontWeight: 600}}>우선순위</h3>
              <span className="mono" style={{fontSize: 11, color:'var(--ink-3)'}}>{priority.length}명</span>
            </div>
            <div style={{fontSize: 11, color:'var(--ink-3)', marginBottom: 10}}>
              한 줄로 줄세우기 — 드래그하여 순서 변경
            </div>
            <PriorityList priority={priority} setPriority={setPriority} points={points}/>
            <div style={{marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--line)'}}>
              <div style={{fontSize: 11, color:'var(--ink-3)', marginBottom: 8}}>필터</div>
              <FilterBar filters={filters} setFilters={setFilters}/>
            </div>
            <div style={{marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--line)'}}>
              <RoleLegend/>
            </div>
          </div>

          {/* Right: combos + heatmap */}
          <div style={{padding: '18px 22px', display:'flex', flexDirection:'column', gap: 22, minWidth: 0}}>
            {/* Top combos panel */}
            <section>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 10}}>
                <div>
                  <h3 style={{fontSize: 13, fontWeight: 600, display:'inline'}}>우선순위 조합</h3>
                  <span style={{fontSize: 11, color:'var(--ink-3)', marginLeft: 8}}>선호도순 · 전체 {preferredCombos.length}개</span>
                </div>
                <span style={{fontSize: 11, color:'var(--ink-3)'}}>선호도 = 역할별 우선순위 선호도 합</span>
              </div>
              <div style={{
                display:'grid', gridTemplateColumns:'32px 1fr 60px 70px',
                padding: '4px 12px', fontSize: 10, color:'var(--ink-3)',
                textTransform:'uppercase', letterSpacing: 0.5, gap: 12,
              }}>
                <span>순위</span>
                <span>조합</span>
                <span style={{textAlign:'right'}}>선호도</span>
                <span style={{textAlign:'right'}}>가능</span>
              </div>
              <div style={{display:'flex', flexDirection:'column', gap: 1, maxHeight: 216, overflowY:'auto', paddingRight: 4}}>
                {preferredCombos.map(c => (
                  <ComboRow key={c.id} combo={c} selected={selectedId === c.id} onSelect={setSelectedId} focusShowId={focusShowId}/>
                ))}
              </div>
            </section>

            {/* Heatmap */}
            <section>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 10}}>
                <div>
                  <h3 style={{fontSize: 13, fontWeight: 600, display:'inline'}}>조합 × 회차 히트맵</h3>
                  <span style={{fontSize: 11, color:'var(--ink-3)', marginLeft: 8}}>회차 헤더를 누르면 포커스</span>
                </div>
                <Legend/>
              </div>
              <Heatmap shows={shows} combos={preferredCombos} selectedId={selectedId} focusShowId={focusShowId} setFocusShowId={setFocusShowId} setSelectedId={setSelectedId}/>
            </section>
          </div>
        </div>
      </div>

      {/* Detail bar */}
      <DetailBar combo={selected} shows={shows} focusShowId={focusShowId}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
