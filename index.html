}

  const [y, m, d] = dateISO.split('-').map(Number);

  return new Date(y, m - 1, d, hh, mm, 0, 0);

function annotateShows(now = new Date()) {
  const today = startOfLocalDay(now);

    const endDateTime = new Date(dateTime.getTime() + SHOW_DURATION_MINUTES * 60 * 1000);

      d: formatShortDate(dateTime),

      const cast = ROLE_IDS.map(roleId => ({ roleId, actor:s.cast[roleId] }));

function validPriorityPairs(priority = state.priority) {
  const seen = new Set();
  const out = [];
  priority.forEach((p, i) => {
    if (!p.roleId || !p.actor) return;
    if (!ROLE_ACTORS[p.roleId]?.includes(p.actor)) return;
    const key = roleActorKey(p.roleId, p.actor);
    if (seen.has(key)) return;
    seen.add(key);
    if (i < ROLE_IDS.length) out.push({ ...p, key, rank:i + 1 });
  });
  return out;
}
function buildPreferencePoints(priority) {
  const n = ROLE_IDS.length;
  const points = {};
  const seen = new Set();
  priority.forEach((p, i) => {
    if (!p.roleId || !p.actor) return;
    if (!ROLE_ACTORS[p.roleId]?.includes(p.actor)) return;
    const key = roleActorKey(p.roleId, p.actor);
    if (seen.has(key)) return;
    seen.add(key);
    const rank = i + 1;
    points[key] = rank <= n ? Math.max(0, (n - rank + 1) / n) : 0;
  });
  return points;

function buildCombos(priority, activeShows, displayShows = activeShows) {
  const points = buildPreferencePoints(priority);
  const activeSlotsByCombo = new Map();
  activeShows.forEach(s => {
    if (!activeSlotsByCombo.has(s.comboKey)) activeSlotsByCombo.set(s.comboKey, []);
    activeSlotsByCombo.get(s.comboKey).push(s.id);
  });
  const displaySlotsByCombo = new Map();
  displayShows.forEach(s => {
    if (!displaySlotsByCombo.has(s.comboKey)) displaySlotsByCombo.set(s.comboKey, []);
    displaySlotsByCombo.get(s.comboKey).push(s.id);
  });
  return ALL_COMBO_TEMPLATES.map(t => {
    const score = t.cast.reduce((sum, c) => sum + (points[roleActorKey(c.roleId, c.actor)] || 0), 0);
    const slots = activeSlotsByCombo.get(t.id) || [];
    const displaySlots = displaySlotsByCombo.get(t.id) || [];
    const pastSlots = displaySlots.filter(id => !slots.includes(id));

function makeEarliestComparator(shows) {
  const showOrder = new Map(shows.map((s, i) => [s.id, i]));
  const earliest = combo => combo.slots.length ? Math.min(...combo.slots.map(id => showOrder.get(id) ?? Number.POSITIVE_INFINITY)) : Number.POSITIVE_INFINITY;

  return [...combos].sort((a, b) =>

  } else {

function findRecommendationCards(candidateShows, pairs) {
  const total = pairs.length;
  if (total === 0) return { full:null, alternative:candidateShows[0] || null };
  const full = candidateShows.find(item => item.match.count === total) || null;
  const alternatives = candidateShows.filter(item => item.match.count > 0 && item.match.count < total);
  alternatives.sort((a,b) => b.match.count - a.match.count || a.show.dateTime - b.show.dateTime || (a.rank ?? 9999) - (b.rank ?? 9999));
